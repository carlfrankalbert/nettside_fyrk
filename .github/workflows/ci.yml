name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast quality gates - target: ~2 minutes
  # Full E2E, visual regression, and a11y runs post-deploy
  quality-gates:
    name: Quality Gates (~2 min)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      # Quick a11y smoke check on homepage (full suite runs post-deploy)
      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Quick accessibility check (homepage only)
        run: npx playwright test tests/a11y.spec.ts --project=a11y --grep "Landing page"
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://fyrk.no

      - name: Upload results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
