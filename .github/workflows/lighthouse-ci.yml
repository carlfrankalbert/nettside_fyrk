name: Lighthouse CI

on:
  # Run after deploy to track performance trends
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types:
      - completed
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Performance Audit
    runs-on: ubuntu-latest
    # Only run if deploy was successful (or manual/scheduled trigger)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Wait for deployment to propagate
      - name: Wait for deployment propagation
        if: github.event_name == 'workflow_run'
        run: sleep 30

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          urls: |
            https://fyrk.no/
            https://fyrk.no/okr-sjekken
            https://fyrk.no/konseptspeilet
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check Lighthouse outcome
        if: steps.lighthouse.outcome == 'failure'
        run: |
          echo "::warning::Lighthouse run had issues. Review the report for details."

      - name: Format lighthouse score
        id: format_lighthouse
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            // Check if manifest exists
            if (!fs.existsSync('.lighthouseci/manifest.json')) {
              core.setOutput('summary', '## Lighthouse Results\n\n⚠️ Lighthouse run did not produce results.');
              return;
            }

            const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));

            let summary = '## Lighthouse Results\n\n';

            for (const result of results) {
              const lhr = JSON.parse(fs.readFileSync(result.jsonPath, 'utf8'));
              const url = new URL(lhr.finalUrl).pathname || '/';

              const scores = {
                performance: Math.round(lhr.categories.performance.score * 100),
                accessibility: Math.round(lhr.categories.accessibility.score * 100),
                bestPractices: Math.round(lhr.categories['best-practices'].score * 100),
                seo: Math.round(lhr.categories.seo.score * 100),
              };

              const getEmoji = (score) => {
                if (score >= 90) return '🟢';
                if (score >= 50) return '🟠';
                return '🔴';
              };

              summary += `### ${url}\n\n`;
              summary += `| Category | Score |\n`;
              summary += `|----------|-------|\n`;
              summary += `| ${getEmoji(scores.performance)} Performance | ${scores.performance} |\n`;
              summary += `| ${getEmoji(scores.accessibility)} Accessibility | ${scores.accessibility} |\n`;
              summary += `| ${getEmoji(scores.bestPractices)} Best Practices | ${scores.bestPractices} |\n`;
              summary += `| ${getEmoji(scores.seo)} SEO | ${scores.seo} |\n\n`;

              // Add Core Web Vitals
              const lcp = lhr.audits['largest-contentful-paint']?.numericValue;
              const fcp = lhr.audits['first-contentful-paint']?.numericValue;
              const cls = lhr.audits['cumulative-layout-shift']?.numericValue;
              const ttfb = lhr.audits['server-response-time']?.numericValue;
              const tbt = lhr.audits['total-blocking-time']?.numericValue;

              summary += `**Core Web Vitals:**\n`;
              if (lcp) summary += `- LCP: ${(lcp/1000).toFixed(2)}s\n`;
              if (fcp) summary += `- FCP: ${(fcp/1000).toFixed(2)}s\n`;
              if (tbt) summary += `- TBT: ${Math.round(tbt)}ms\n`;
              if (cls !== undefined) summary += `- CLS: ${cls.toFixed(3)}\n`;
              if (ttfb) summary += `- TTFB: ${Math.round(ttfb)}ms\n`;
              summary += '\n';
            }

            core.setOutput('summary', summary);

      - name: Write to job summary
        if: always()
        run: |
          echo "${{ steps.format_lighthouse.outputs.summary }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
          if-no-files-found: ignore
